name: Release Rust crates

on:
  push:
    tags:
      - 'v[0-9]+*'

permissions:
  contents: read

jobs:
  crates:
    runs-on: ubuntu-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    container: ghcr.io/nnpdf/pineappl-ci:latest
    steps:
      - uses: actions/checkout@v6
      - name: Release all crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          # this must be at least Rust 1.66 to support waiting for dependencies to on crates.io:
          # https://github.com/rust-lang/cargo/blob/master/CHANGELOG.md#cargo-166-2022-12-15
          rustup default stable
          cd pineappl
          cargo publish
          cd ../pineappl_applgrid
          cargo publish
          cd ../pineappl_fastnlo
          cargo publish
          # TODO: it's debatable whether this should be published
          cd ../pineappl_capi
          cargo publish
          cd ../pineappl_cli
          cargo publish
