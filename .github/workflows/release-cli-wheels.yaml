name: Release CLI Python distribution

# for available runner images see: https://github.com/actions/runner-images

on:
  push:
    tags:
      - 'v[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
            manylinux: 2_17
          # - runner: ubuntu-22.04
          #   target: x86
