name: Release Python wheels

# for available runner images see: https://github.com/actions/runner-images

on:
  push:
    tags:
      - 'v[0-9]+*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-22.04
            target: x86_64
            manylinux: 2_17
          # - runner: ubuntu-22.04
          #   target: x86
          #   manylinux: 2_17
          # - runner: ubuntu-22.04
          #   target: aarch64
          #   manylinux: 2_17
          # - runner: ubuntu-22.04
          #   target: armv7
          #   manylinux: 2_17
          # - runner: ubuntu-22.04
          #   target: s390x
          #   manylinux: 2_17
          # - runner: ubuntu-22.04
          #   target: ppc64le
          #   manylinux: 2_17
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter python3.8 python3.9 python3.10 python3.11 python3.12 python3.13 python3.14 pypy3.9 pypy3.10 pypy3.11 --manifest-path pineappl_py/Cargo.toml
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }}
          manylinux: ${{ matrix.platform.manylinux }}
      - name: Upload wheels
        uses: actions/upload-artifact@v5
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

